{% extends 'productos/base.html' %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h3 class="card-title">Eliminar producto</h3>
        <p>¿Estás seguro de eliminar el producto <strong>{{ producto.nombre }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'listar_productos' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
